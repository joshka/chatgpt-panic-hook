name: Release-plz

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  verify:
    name: Verify
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  release-plz-release:
    name: Release-plz release
    if: github.repository_owner == 'joshka'
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # Create the release tag and GitHub release.
      id-token: write # Authenticate to crates.io with trusted publishing.
      pull-requests: read # Read release metadata from the merged pull request.
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Run release-plz
        uses: release-plz/action@1a0c5beec2fe4e91727549b5d2d0715ed28684bb # v0.5.131
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    if: github.repository_owner == 'joshka'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      actions: write # Dispatch CI for pull requests created by GITHUB_TOKEN.
      contents: write # Create and update the release branch.
      pull-requests: write # Create and update the release pull request.
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Run release-plz
        id: release_pr
        uses: release-plz/action@1a0c5beec2fe4e91727549b5d2d0715ed28684bb # v0.5.131
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run CI on the release PR
        if: steps.release_pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR: ${{ steps.release_pr.outputs.pr }}
        run: |
          head_branch="$(jq -er '.head_branch' <<< "$RELEASE_PR")"
          gh workflow run ci.yml --ref "$head_branch"
